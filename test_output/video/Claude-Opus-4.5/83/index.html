<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive 3D diamond wave animation with dynamic color transitions">
    <meta name="keywords" content="3D animation, wave effect, interactive, canvas, WebGL">
    <title>3D Diamond Wave Animation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main id="app" role="main" aria-label="Interactive 3D diamond wave animation">
        <canvas id="canvas" aria-hidden="true"></canvas>
        <div class="sr-only" aria-live="polite" id="status">
            Interactive 3D diamond wave animation loaded. Move your mouse to interact.
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
