<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar - City of Guthrie, Oklahoma</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo">
                <img src="images/logo.svg" alt="City of Guthrie Oklahoma">
            </a>
            <nav class="main-nav">
                <ul class="nav-list">
                    <li class="nav-item has-dropdown">
                        <a href="#">Government <span class="dropdown-arrow">&#9662;</span></a>
                    </li>
                    <li class="nav-item has-dropdown">
                        <a href="#">Offices <span class="dropdown-arrow">&#9662;</span></a>
                    </li>
                    <li class="nav-item has-dropdown">
                        <a href="#">Residents <span class="dropdown-arrow">&#9662;</span></a>
                    </li>
                    <li class="nav-item">
                        <a href="#">Visitors</a>
                    </li>
                    <li class="nav-item active">
                        <a href="calendar.html">Calendar</a>
                    </li>
                    <li class="nav-item has-dropdown">
                        <a href="#">About <span class="dropdown-arrow">&#9662;</span></a>
                    </li>
                </ul>
            </nav>
            <button class="search-btn" aria-label="Search">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="M21 21l-4.35-4.35"></path>
                </svg>
            </button>
        </div>
    </header>

    <main>
        <section class="hero hero-dark">
            <div class="hero-content">
                <!-- Dark hero area for calendar page -->
            </div>
        </section>

        <section class="page-title-bar">
            <div class="container">
                <h1>Calendar</h1>
            </div>
        </section>

        <section class="calendar-section">
            <div class="calendar-container">
                <div class="calendar-main">
                    <div class="calendar-header">
                        <div class="month-nav">
                            <span class="month-name">January</span>
                            <button class="nav-arrow" aria-label="Next month">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="9 18 15 12 9 6"></polyline>
                                </svg>
                            </button>
                        </div>
                        <div class="year-nav">
                            <span class="year-name">2026</span>
                            <button class="nav-arrow" aria-label="Next year">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="9 18 15 12 9 6"></polyline>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="calendar-grid">
                        <div class="calendar-weekdays">
                            <span>Sun</span>
                            <span>Mon</span>
                            <span>Tue</span>
                            <span>Wed</span>
                            <span>Thu</span>
                            <span>Fri</span>
                            <span>Sat</span>
                        </div>
                        <div class="calendar-days" id="calendarDays">
                            <!-- Days will be generated by JavaScript -->
                        </div>
                    </div>
                </div>
                <div class="calendar-sidebar">
                    <h2>Upcoming Events</h2>
                    <div class="events-list" id="eventsList">
                        <p class="no-events">No upcoming events</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div class="notification-bell">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 01-3.46 0"></path>
        </svg>
    </div>

    <script src="js/main.js"></script>
    <script src="js/calendar.js"></script>
</body>
</html>
