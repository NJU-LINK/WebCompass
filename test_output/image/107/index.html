<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City of Guthrie, Oklahoma</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo">
                <img src="images/logo.svg" alt="City of Guthrie Oklahoma">
            </a>
            <nav class="main-nav">
                <ul class="nav-list">
                    <li class="nav-item has-dropdown">
                        <a href="#">Government <span class="dropdown-arrow">&#9662;</span></a>
                    </li>
                    <li class="nav-item has-dropdown">
                        <a href="#">Offices <span class="dropdown-arrow">&#9662;</span></a>
                    </li>
                    <li class="nav-item has-dropdown">
                        <a href="#">Residents <span class="dropdown-arrow">&#9662;</span></a>
                    </li>
                    <li class="nav-item">
                        <a href="#">Visitors</a>
                    </li>
                    <li class="nav-item active">
                        <a href="calendar.html">Calendar</a>
                    </li>
                    <li class="nav-item has-dropdown">
                        <a href="#">About <span class="dropdown-arrow">&#9662;</span></a>
                    </li>
                </ul>
            </nav>
            <button class="search-btn" aria-label="Search">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="M21 21l-4.35-4.35"></path>
                </svg>
            </button>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <div class="hero-logo">
                    <img src="images/hero-logo.svg" alt="City of Guthrie Oklahoma">
                </div>
            </div>
        </section>

        <section class="quick-links">
            <div class="quick-links-container">
                <a href="calendar.html" class="quick-link-item">
                    <div class="quick-link-icon blue">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6" stroke="currentColor" stroke-width="2"></line>
                            <line x1="8" y1="2" x2="8" y2="6" stroke="currentColor" stroke-width="2"></line>
                            <line x1="3" y1="10" x2="21" y2="10" stroke="currentColor" stroke-width="2"></line>
                            <rect x="7" y="14" width="3" height="3" fill="currentColor"></rect>
                            <rect x="14" y="14" width="3" height="3" fill="currentColor"></rect>
                        </svg>
                    </div>
                    <span class="quick-link-text">Calendar</span>
                </a>
                <a href="#" class="quick-link-item">
                    <div class="quick-link-icon navy">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M3 7h18v2H3V7zm0 4h18v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6z" fill="none" stroke="currentColor" stroke-width="2"></path>
                            <path d="M7 11v6M12 11v6M17 11v6" stroke="currentColor" stroke-width="1.5"></path>
                        </svg>
                    </div>
                    <span class="quick-link-text">Agendas &<br>Minutes</span>
                </a>
                <a href="#" class="quick-link-item">
                    <div class="quick-link-icon green">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                        </svg>
                    </div>
                    <span class="quick-link-text">Forms &<br>Permits</span>
                </a>
                <a href="#" class="quick-link-item">
                    <div class="quick-link-icon green-dark">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"></circle>
                            <text x="12" y="16" text-anchor="middle" font-size="10" font-weight="bold" fill="currentColor">$</text>
                        </svg>
                    </div>
                    <span class="quick-link-text">Make a<br>Payment</span>
                </a>
                <a href="#" class="quick-link-item">
                    <div class="quick-link-icon red">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="16" rx="2"></rect>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                            <line x1="9" y1="4" x2="9" y2="20"></line>
                            <line x1="15" y1="4" x2="15" y2="20"></line>
                        </svg>
                    </div>
                    <span class="quick-link-text">Facilities</span>
                </a>
                <a href="#" class="quick-link-item">
                    <div class="quick-link-icon red-dark">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="7" width="20" height="14" rx="2"></rect>
                            <path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"></path>
                            <line x1="12" y1="12" x2="12" y2="16"></line>
                        </svg>
                    </div>
                    <span class="quick-link-text">Employment</span>
                </a>
            </div>
        </section>
    </main>

    <div class="notification-bell">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 01-3.46 0"></path>
        </svg>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
